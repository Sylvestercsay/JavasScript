<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T11 - Article Cards with Modal</title>
  <style>
    .card {
      border: 1px solid #ccc;
      margin: 10px;
      padding: 10px;
      max-width: 300px;
      display: inline-block;
      vertical-align: top;
      cursor: pointer;
    }
    .card img {
      width: 100%;
    }
    dialog {
      padding: 10px;
      border: 2px solid #333;
      border-radius: 8px;
    }
    dialog img {
      max-width: 90vw;
      max-height: 80vh;
      display: block;
    }
    dialog span {
      display: block;
      text-align: right;
      font-size: 1.5rem;
      cursor: pointer;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>Task 11</h1>
  <section id="target"></section>


  <dialog id="modal">
    <span>&#x2715;</span>
    <img src="" alt="">
  </dialog>

  <script src="main.js"></script>
</body>
</html>
